<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boss Made Events | Atlanta</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --border: #1e1e2e;
      --accent: #6c63ff;
      --accent2: #ff6b6b;
      --text: #e0e0e0;
      --muted: #888;
      --gradient: linear-gradient(135deg, #6c63ff 0%, #ff6b6b 100%);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Header */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span { opacity: 0.6; font-weight: 400; }

    .last-updated {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Content */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
    }

    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .badge {
      background: var(--accent);
      color: white;
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-weight: 600;
    }

    .badge.today {
      background: var(--accent2);
    }

    /* Event cards */
    .event-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: transform 0.2s, border-color 0.2s;
    }

    .event-card:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
    }

    .event-card.today-card {
      border-color: var(--accent2);
      background: linear-gradient(135deg, rgba(108,99,255,0.08) 0%, rgba(255,107,107,0.05) 100%);
    }

    .event-card .title {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .event-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .event-card .meta .emoji {
      margin-right: 0.25rem;
    }

    .event-card .description {
      font-size: 0.9rem;
      color: var(--text);
      opacity: 0.85;
    }

    .event-card .tag {
      display: inline-block;
      background: rgba(108, 99, 255, 0.15);
      color: var(--accent);
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      margin-top: 0.75rem;
      font-weight: 500;
    }

    /* Date cards */
    .date-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .date-card .emoji {
      font-size: 2rem;
      margin-bottom: 0.75rem;
    }

    .date-card .category {
      font-size: 0.75rem;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    .date-card .title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .date-card .description {
      font-size: 0.9rem;
      color: var(--text);
      opacity: 0.85;
      margin-bottom: 1rem;
    }

    .date-card .details {
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.85rem;
    }

    .date-card .details div {
      display: flex;
      justify-content: space-between;
      padding: 0.25rem 0;
      border-bottom: 1px solid var(--border);
    }

    .date-card .details div:last-child { border-bottom: none; }
    .date-card .details span:first-child { color: var(--muted); }

    /* Expired notice */
    .expired-notice {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .expired-notice .emoji { font-size: 2rem; margin-bottom: 0.5rem; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-state p { font-size: 0.95rem; }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 500px) {
      .header-inner { flex-direction: column; align-items: flex-start; }
      .tabs { padding: 0.75rem 1rem; }
      .event-card { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">⚡ Boss Made <span>Events</span></div>
    <div class="last-updated" id="lastUpdated"></div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('events')">🎭 Atlanta Events</button>
  <button class="tab-btn" onclick="switchTab('dates')">💑 Date Night</button>
</div>

<main>
  <div id="events" class="tab-content active">
    <div id="eventsList"></div>
  </div>
  <div id="dates" class="tab-content">
    <div id="datesList"></div>
  </div>
</main>

<footer>
  Powered by <a href="https://bossmade.co" target="_blank">Boss Made</a> · Updated daily via cron
</footer>

<script>
  // Parse date string to Date object (handles formats like "Saturday, April 4", "April 5", etc.)
  function parseDate(str) {
    if (!str) return null;
    // Try to parse "Weekday, Month Day" format
    const thisYear = new Date().getFullYear();
    const withYear = str + ', ' + thisYear;
    let d = new Date(withYear);
    if (!isNaN(d.getTime())) return d;
    // Try just "Month Day"
    d = new Date(str + ' ' + thisYear);
    if (!isNaN(d.getTime())) return d;
    return null;
  }

  function isToday(str) {
    const d = parseDate(str);
    if (!d) return false;
    const now = new Date();
    return d.toDateString() === now.toDateString();
  }

  function isPast(str) {
    const d = parseDate(str);
    if (!d) return false;
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return d < now;
  }

  function isFuture(str) {
    const d = parseDate(str);
    if (!d) return true; // no date = show it
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return d >= now;
  }

  async function loadData() {
    const [eventsRes, datesRes, metaRes] = await Promise.all([
      fetch('events.json').catch(() => null),
      fetch('dates.json').catch(() => null),
      fetch('meta.json').catch(() => null)
    ]);

    const events = eventsRes ? await eventsRes.json() : null;
    const dates = datesRes ? await datesRes.json() : null;
    const meta = metaRes ? await metaRes.json() : null;

    // Last updated
    if (meta && meta.generated) {
      const d = new Date(meta.generated);
      document.getElementById('lastUpdated').textContent =
        'Updated ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── EVENTS ────────────────────────────────────────────────
    const eventsList = document.getElementById('eventsList');
    if (events && events.length) {
      // Filter to only upcoming events
      const upcoming = events.filter(ev => !isPast(ev.date));

      // Split today vs upcoming
      const todayEvents = upcoming.filter(ev => isToday(ev.date));
      const futureEvents = upcoming.filter(ev => !isToday(ev.date));

      let html = '';

      if (todayEvents.length) {
        html += '<div class="section-header"><h2>🔥 Today</h2><span class="badge today">HAPPENING NOW</span></div>';
        html += todayEvents.map(ev => buildEventCard(ev, true)).join('');
      }

      if (futureEvents.length) {
        const heading = todayEvents.length
          ? '<div class="section-header"><h2>📅 Coming Up</h2><span class="badge">UPCOMING</span></div>'
          : '<div class="section-header"><h2>📅 Upcoming Events</h2><span class="badge">NEXT 2 WEEKS</span></div>';
        html += heading + futureEvents.map(ev => buildEventCard(ev, false)).join('');
      }

      if (!upcoming.length) {
        html += '<div class="expired-notice"><div class="emoji">🎭</div><p>All events have passed.<br>New events drop daily — check back tomorrow!</p></div>';
      }

      eventsList.innerHTML = html;
    } else {
      eventsList.innerHTML = '<div class="empty-state"><div class="emoji">🎭</div><p>No events loaded yet.<br>Check back soon!</p></div>';
    }

    // ── DATES ────────────────────────────────────────────────
    const datesList = document.getElementById('datesList');
    if (dates && dates.length) {
      // Filter: show if no validUntil, or validUntil hasn't passed
      const now = new Date();
      const active = dates.filter(date => {
        if (!date.validUntil) return true;
        const d = parseDate(date.validUntil);
        return d && d >= now;
      });

      if (active.length) {
        datesList.innerHTML =
          '<div class="section-header"><h2>✨ This Weekend\'s Picks</h2><span class="badge today">CURATED</span></div>' +
          active.map(date => buildDateCard(date)).join('');
      } else {
        datesList.innerHTML = '<div class="expired-notice"><div class="emoji">💑</div><p>This week\'s dates have passed.<br>New ideas drop every Saturday!</p></div>';
      }
    } else {
      datesList.innerHTML = '<div class="empty-state"><div class="emoji">💑</div><p>No date ideas yet.<br>Check back on Saturdays!</p></div>';
    }
  }

  function buildEventCard(ev, isToday) {
    return `
      <div class="event-card${isToday ? ' today-card' : ''}">
        <div class="title">${ev.title}</div>
        <div class="meta">
          ${ev.date ? `<span>📅 ${ev.date}</span>` : ''}
          ${ev.time ? `<span>🕐 ${ev.time}</span>` : ''}
          ${ev.location ? `<span>📍 ${ev.location}</span>` : ''}
          ${ev.price ? `<span>💰 ${ev.price}</span>` : ''}
        </div>
        ${ev.description ? `<div class="description">${ev.description}</div>` : ''}
        ${ev.category ? `<span class="tag">${ev.category}</span>` : ''}
      </div>
    `;
  }

  function buildDateCard(date) {
    return `
      <div class="date-card">
        <div class="emoji">${date.emoji || '💑'}</div>
        <div class="category">${date.category || 'Date Night'}</div>
        <div class="title">${date.title}</div>
        ${date.description ? `<div class="description">${date.description}</div>` : ''}
        ${date.budget || date.location || date.vibe ? `
          <div class="details">
            ${date.budget ? `<div><span>Budget</span><span>${date.budget}</span></div>` : ''}
            ${date.location ? `<div><span>Location</span><span>${date.location}</span></div>` : ''}
            ${date.vibe ? `<div><span>Vibe</span><span>${date.vibe}</span></div>` : ''}
          </div>
        ` : ''}
      </div>
    `;
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    document.getElementById(tab).classList.add('active');
  }

  loadData();
</script>

</body>
</html>
